<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 统计图制作系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-requirements {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            font-size: 12px;
        }

        .password-requirements h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            color: #666;
        }

        .requirement.valid {
            color: #28a745;
        }

        .requirement.invalid {
            color: #dc3545;
        }

        .requirement-icon {
            margin-right: 6px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-container {
            text-align: center;
            display: none;
        }

        .success-container.show {
            display: block;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .success-container h2 {
            color: #28a745;
            margin-bottom: 15px;
        }

        .success-container p {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="formContainer">
            <div class="header">
                <h1>🔑 设置新密码</h1>
                <p>请输入您的新密码</p>
            </div>

            <div id="message" class="message"></div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在重置密码...</p>
            </div>

            <form id="resetForm" style="display: block;">
                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input
                        type="password"
                        id="new_password"
                        name="new_password"
                        placeholder="请输入新密码"
                        required
                        autocomplete="new-password"
                    >
                    <div class="password-requirements">
                        <h4>密码要求：</h4>
                        <div class="requirement" id="req_length">
                            <span class="requirement-icon">○</span>
                            <span>至少8个字符</span>
                        </div>
                        <div class="requirement" id="req_uppercase">
                            <span class="requirement-icon">○</span>
                            <span>包含大写字母 (A-Z)</span>
                        </div>
                        <div class="requirement" id="req_lowercase">
                            <span class="requirement-icon">○</span>
                            <span>包含小写字母 (a-z)</span>
                        </div>
                        <div class="requirement" id="req_digit">
                            <span class="requirement-icon">○</span>
                            <span>包含数字 (0-9)</span>
                        </div>
                        <div class="requirement" id="req_special">
                            <span class="requirement-icon">○</span>
                            <span>包含特殊字符 (!@#$%^&*)</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">确认密码</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="请再次输入新密码"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" id="submitBtn">重置密码</button>
            </form>
        </div>

        <div id="successContainer" class="success-container">
            <div class="success-icon">✅</div>
            <h2>密码重置成功！</h2>
            <p>您的密码已成功重置，现在可以使用新密码登录了。</p>
            <a href="/login" style="color: #667eea; text-decoration: none; font-weight: 600;">返回登录</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');
        const formContainer = document.getElementById('formContainer');
        const successContainer = document.getElementById('successContainer');
        const newPasswordInput = document.getElementById('new_password');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.body.innerHTML = `
                <div class="container">
                    <div class="message error">❌ 重置链接无效或已过期</div>
                    <div style="text-align: center; margin-top: 20px;">
                        <a href="/forgot-password" style="color: #667eea;">重新申请密码重置</a>
                    </div>
                </div>
            `;
        }

        const requirements = {
            length: document.getElementById('req_length'),
            uppercase: document.getElementById('req_uppercase'),
            lowercase: document.getElementById('req_lowercase'),
            digit: document.getElementById('req_digit'),
            special: document.getElementById('req_special')
        };

        newPasswordInput.addEventListener('input', (e) => {
            const password = e.target.value;

            const checks = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                digit: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(password)
            };

            updateRequirement('length', checks.length);
            updateRequirement('uppercase', checks.uppercase);
            updateRequirement('lowercase', checks.lowercase);
            updateRequirement('digit', checks.digit);
            updateRequirement('special', checks.special);
        });

        function updateRequirement(key, isValid) {
            const req = requirements[key];
            if (isValid) {
                req.classList.add('valid');
                req.classList.remove('invalid');
                req.querySelector('.requirement-icon').textContent = '✓';
            } else {
                req.classList.remove('valid');
                req.classList.add('invalid');
                req.querySelector('.requirement-icon').textContent = '○';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (!token) {
                showMessage('重置令牌无效', 'error');
                return;
            }

            if (!newPassword) {
                showMessage('请输入新密码', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    formContainer.style.display = 'none';
                    successContainer.classList.add('show');
                } else {
                    showMessage(data.error || '密码重置失败，请稍后重试', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('Error:', error);
            } finally {
                showLoading(false);
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }

        function showLoading(show) {
            loading.classList.toggle('show', show);
            submitBtn.disabled = show;
            form.style.display = show ? 'none' : 'block';
        }
    </script>
</body>
</html>

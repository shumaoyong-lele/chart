<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计图制作系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
        }
        
        .header .uid {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab:hover {
            transform: translateY(-2px);
        }
        
        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        
        .content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #e74c3c;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .chart-result {
            margin-top: 30px;
            text-align: center;
        }
        
        .chart-result img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .view-btn {
            background: #3498db;
            color: white;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        
        .chart-view {
            margin-top: 20px;
        }
        
        .chart-view img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 统计图制作系统</h1>
            <div class="uid">用户 ID: <strong>{{ uid }}</strong></div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('create')">📈 制作图表</div>
            <div class="tab" onclick="showTab('list')">📋 图表列表</div>
        </div>
        
        <!-- 制作图表 -->
        <div class="content active" id="create">
            <form id="chartForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>图表标题</label>
                        <input type="text" id="title" required placeholder="请输入图表标题">
                    </div>
                    <div class="form-group">
                        <label>图表类型</label>
                        <select id="chartType" onchange="changeChartType()">
                            <option value="line">折线图</option>
                            <option value="bar">柱状图</option>
                            <option value="pie">饼图</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="createdBy" value="{{ uid }}">
                    </div>
                </div>
                
                <div id="xyInputs">
                    <div class="form-row">
                        <div class="form-group">
                            <label>X轴标签</label>
                            <input type="text" id="xlabel" placeholder="如：星期">
                        </div>
                        <div class="form-group">
                            <label>Y轴标签</label>
                            <input type="text" id="ylabel" placeholder="如：销量">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>X轴数据（用逗号分隔）</label>
                            <input type="text" id="xdata" placeholder="周一, 周二, 周三, 周四, 周五">
                        </div>
                        <div class="form-group">
                            <label>Y轴数据（用逗号分隔）</label>
                            <input type="text" id="ydata" placeholder="100, 200, 150, 180, 220">
                        </div>
                    </div>
                </div>
                
                <div id="pieInputs" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>标签（用逗号分隔）</label>
                            <input type="text" id="pieLabels" placeholder="苹果, 香蕉, 橙子">
                        </div>
                        <div class="form-group">
                            <label>数据（用逗号分隔）</label>
                            <input type="text" id="pieData" placeholder="30, 45, 25">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn">生成图表</button>
            </form>
            
            <div class="chart-result" id="result" style="display: none;">
                <h3>生成结果</h3>
                <img id="chartImage" src="" alt="图表">
                <p style="margin-top: 10px; color: #27ae60;">✅ 图表已保存到数据库</p>
            </div>
        </div>
        
        <!-- 图表列表 -->
        <div class="content" id="list">
            <h2>📋 已保存的图表</h2>
            <table id="chartTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>类型</th>
                        <th>创建者</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="chartList">
                    <tr><td colspan="6">加载中...</td></tr>
                </tbody>
            </table>
            
            <div class="chart-view" id="chartView" style="display: none;">
                <h3>图表详情</h3>
                <div id="chartDetail"></div>
            </div>
        </div>
    </div>
    
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'list') {
                loadCharts();
            }
        }
        
        function changeChartType() {
            const type = document.getElementById('chartType').value;
            if (type === 'pie') {
                document.getElementById('xyInputs').style.display = 'none';
                document.getElementById('pieInputs').style.display = 'block';
            } else {
                document.getElementById('xyInputs').style.display = 'block';
                document.getElementById('pieInputs').style.display = 'none';
            }
        }
        
        document.getElementById('chartForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const chartType = document.getElementById('chartType').value;
            const createdBy = document.getElementById('createdBy').value;
            
            let xdata = [], ydata = [], labels = [];
            
            if (chartType === 'pie') {
                labels = document.getElementById('pieLabels').value.split(',').map(s => s.trim());
                ydata = document.getElementById('pieData').value.split(',').map(s => parseFloat(s.trim()));
            } else {
                xdata = document.getElementById('xdata').value.split(',').map(s => s.trim());
                ydata = document.getElementById('ydata').value.split(',').map(s => parseFloat(s.trim()));
            }
            
            const response = await fetch('/api/charts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title, chart_type: chartType, xdata, ydata, labels, created_by: createdBy
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('chartImage').src = result.image;
                document.getElementById('result').style.display = 'block';
            } else {
                alert('生成失败: ' + result.error);
            }
        });
        
        async function loadCharts() {
            const response = await fetch('/api/charts');
            const charts = await response.json();
            
            const tbody = document.getElementById('chartList');
            if (charts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = charts.map(chart => `
                <tr>
                    <td>${chart.id}</td>
                    <td>${chart.title}</td>
                    <td>${chart.chart_type}</td>
                    <td>${chart.created_by}</td>
                    <td>${new Date(chart.created_at).toLocaleString()}</td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewChart(${chart.id})">查看</button>
                        <button class="action-btn delete-btn" onclick="deleteChart(${chart.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function viewChart(id) {
            const response = await fetch('/api/charts/' + id);
            const chart = await response.json();
            
            if (chart.error) {
                alert('未找到');
                return;
            }
            
            // 重新生成图表
            const chartType = chart.chart_type;
            let xdata = chart.x_labels, ydata = chart.y_data, labels = chart.labels;
            
            const response2 = await fetch('/api/charts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title: chart.title + ' (预览)',
                    chart_type: chartType,
                    xdata, ydata, labels,
                    created_by: chart.created_by
                })
            });
            
            const result = await response2.json();
            
            document.getElementById('chartDetail').innerHTML = `
                <p><strong>标题:</strong> ${chart.title}</p>
                <p><strong>类型:</strong> ${chartType}</p>
                <p><strong>创建者:</strong> ${chart.created_by}</p>
                <p><strong>创建时间:</strong> ${new Date(chart.created_at).toLocaleString()}</p>
                <img src="${result.image}" alt="图表" style="max-width: 100%; margin-top: 20px;">
            `;
            document.getElementById('chartView').style.display = 'block';
        }
        
        async function deleteChart(id) {
            if (!confirm('确定要删除这个图表吗？')) return;
            
            const response = await fetch('/api/charts/' + id, {method: 'DELETE'});
            const result = await response.json();
            
            if (result.success) {
                alert('删除成功');
                loadCharts();
            } else {
                alert('删除失败');
            }
        }
    </script>
</body>
</html>

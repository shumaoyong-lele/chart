<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="统计图制作系统 - 创建专业的可视化图表">
    <meta name="theme-color" content="#667eea">
    <meta name="author" content="Chart System">
    <meta name="robots" content="index, follow">
    <title>统计图制作系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <div class="card">
            <header class="header">
                <div class="header-content">
                    <h1>📊 统计图制作系统</h1>
                    <p class="subtitle">创建专业的数据可视化图表</p>
                    <div class="uid">
                        <span>👤</span>
                        <span>用户 ID: <strong id="displayUid">{{ uid }}</strong></span>
                    </div>
                </div>
                <nav class="user-actions">
                    <button class="btn btn-primary" id="loginBtn" onclick="openModal('login')">
                        🔑 登录
                    </button>
                    <button class="btn btn-secondary" id="registerBtn" onclick="openModal('register')">
                        ✨ 注册
                    </button>
                    <button class="btn btn-danger" id="logoutBtn" onclick="logout()" style="display: none;">
                        🚪 退出
                    </button>
                </nav>
            </header>
        </div>

        <nav class="tabs" role="tablist">
            <button class="tab active" data-tab="create" role="tab" aria-selected="true" onclick="showTab('create')">
                📈 制作图表
            </button>
            <button class="tab" data-tab="list" role="tab" aria-selected="false" onclick="showTab('list')">
                📋 图表列表
            </button>
        </nav>

        <main>
            <section class="content active" id="create" role="tabpanel" aria-labelledby="tab-create">
                <article class="card">
                    <div id="loginTip" class="login-tip" style="display: none;">
                        <div class="icon">🔒</div>
                        <h3>登录后可创建图表</h3>
                        <p>登录后将您的图表保存到云端，随时随地访问</p>
                        <button class="btn btn-primary" onclick="openModal('login')">立即登录</button>
                    </div>

                    <form id="chartForm" aria-label="图表创建表单">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="title">
                                    图表标题
                                    <span class="required">*</span>
                                </label>
                                <input type="text" id="title" class="form-input" required
                                       placeholder="例如：2024年季度销售额" minlength="2" maxlength="100"
                                       aria-describedby="title-hint">
                                <span class="form-hint" id="title-hint">长度 2-100 个字符</span>
                            </div>

                            <div class="form-group">
                                <label for="chartType">
                                    图表类型
                                    <span class="required">*</span>
                                </label>
                                <select id="chartType" class="form-input" onchange="changeChartType()">
                                    <option value="line">📈 折线图</option>
                                    <option value="bar">📊 柱状图</option>
                                    <option value="pie">🥧 饼图</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="xlabel">X轴标签</label>
                                <input type="text" id="xlabel" class="form-input" placeholder="例如：星期"
                                       aria-describedby="xlabel-hint">
                                <span class="form-hint" id="xlabel-hint">X轴显示的名称</span>
                            </div>

                            <div class="form-group">
                                <label for="ylabel">Y轴标签</label>
                                <input type="text" id="ylabel" class="form-input" placeholder="例如：销量"
                                       aria-describedby="ylabel-hint">
                                <span class="form-hint" id="ylabel-hint">Y轴显示的名称</span>
                            </div>
                        </div>

                        <div id="xyInputs">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="xdata">
                                        X轴数据
                                        <span class="required">*</span>
                                    </label>
                                    <input type="text" id="xdata" class="form-input"
                                           placeholder="周一, 周二, 周三, 周四, 周五" required
                                           aria-describedby="xdata-hint">
                                    <span class="form-hint" id="xdata-hint">用英文逗号分隔</span>
                                </div>

                                <div class="form-group">
                                    <label for="ydata">
                                        Y轴数据
                                        <span class="required">*</span>
                                    </label>
                                    <input type="text" id="ydata" class="form-input"
                                           placeholder="100, 200, 150, 180, 220" required
                                           aria-describedby="ydata-hint">
                                    <span class="form-hint" id="ydata-hint">用英文逗号分隔（数字）</span>
                                </div>
                            </div>
                        </div>

                        <div id="pieInputs" style="display: none;">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="pieLabels">
                                        标签
                                        <span class="required">*</span>
                                    </label>
                                    <input type="text" id="pieLabels" class="form-input"
                                           placeholder="苹果, 香蕉, 橙子"
                                           aria-describedby="pieLabels-hint">
                                    <span class="form-hint" id="pieLabels-hint">用英文逗号分隔</span>
                                </div>

                                <div class="form-group">
                                    <label for="pieData">
                                        数据
                                        <span class="required">*</span>
                                    </label>
                                    <input type="text" id="pieData" class="form-input"
                                           placeholder="30, 45, 25"
                                           aria-describedby="pieData-hint">
                                    <span class="form-hint" id="pieData-hint">用英文逗号分隔（数字）</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-lg" id="createBtn">
                                🎨 生成图表
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="resetForm()">
                                🔄 重置
                            </button>
                        </div>
                    </form>

                    <div class="chart-result" id="result" style="display: none;" role="region" aria-label="图表结果">
                        <h3>🎉 图表生成成功！</h3>
                        <img id="chartImage" src="" alt="生成的图表">
                        <div class="chart-actions">
                            <button class="btn btn-success btn-sm" onclick="downloadChart()">
                                ⬇️ 下载图表
                            </button>
                            <button class="btn btn-secondary btn-sm" onclick="createAnother()">
                                ➕ 创建新图表
                            </button>
                        </div>
                    </div>
                </article>
            </section>

            <section class="content" id="list" role="tabpanel" aria-labelledby="tab-list">
                <article class="card">
                    <div class="stats-bar" role="region" aria-label="统计信息">
                        <div class="stat-item">
                            <div class="label">图表总数</div>
                            <div class="value" id="totalCharts">0</div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="searchInput">🔍 搜索图表</label>
                            <input type="text" id="searchInput" class="form-input"
                                   placeholder="输入关键词搜索..."
                                   oninput="handleSearch()"
                                   aria-describedby="search-hint">
                            <span class="form-hint" id="search-hint">输入至少2个字符开始搜索</span>
                        </div>
                    </div>

                    <div class="table-container">
                        <table role="grid" aria-label="图表列表">
                            <thead>
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">标题</th>
                                    <th scope="col">类型</th>
                                    <th scope="col">创建者</th>
                                    <th scope="col">创建时间</th>
                                    <th scope="col">操作</th>
                                </tr>
                            </thead>
                            <tbody id="chartList">
                                <tr>
                                    <td colspan="6">
                                        <div class="empty-state">
                                            <div class="spinner"></div>
                                            <p>加载中...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="chart-view" id="chartView" style="display: none;" role="region" aria-label="图表详情">
                        <div class="chart-preview">
                            <h4>📊 图表详情</h4>
                            <div id="chartDetail"></div>
                        </div>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <div class="modal">
            <header class="modal-header">
                <h2 id="login-title">🔑 登录</h2>
                <button class="modal-close" onclick="closeModal('login')" aria-label="关闭">×</button>
            </header>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">用户名</label>
                        <input type="text" id="loginUsername" class="form-input"
                               required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" class="form-input"
                               required placeholder="请输入密码">
                    </div>
                </form>
            </div>
            <footer class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('login')">取消</button>
                <button type="submit" class="btn btn-primary" form="loginForm">登录</button>
            </footer>
            <div class="switch-auth">
                <a href="/forgot-password" class="forgot-password">忘记密码？</a>
                <span>还没有账号？</span>
                <a onclick="switchTo('register')" tabindex="0">立即注册</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="registerModal" role="dialog" aria-modal="true" aria-labelledby="register-title">
        <div class="modal">
            <header class="modal-header">
                <h2 id="register-title">✨ 注册</h2>
                <button class="modal-close" onclick="closeModal('register')" aria-label="关闭">×</button>
            </header>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">用户名</label>
                        <input type="text" id="regUsername" class="form-input"
                               required placeholder="请输入用户名（至少3个字符）" minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">密码</label>
                        <input type="password" id="regPassword" class="form-input"
                               required placeholder="请输入密码（至少6个字符）" minlength="6">
                    </div>
                </form>
            </div>
            <footer class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('register')">取消</button>
                <button type="submit" class="btn btn-primary" form="registerForm">注册</button>
            </footer>
            <div class="switch-auth">
                已有账号？<a onclick="switchTo('login')" tabindex="0">立即登录</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
